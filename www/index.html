<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#111111">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Lumenis v7 HUD</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        #hud {
            margin: 15px;
            padding: 20px;
        }
        h2 {
            color: #ff6b9d;
            text-shadow: 0 0 10px rgba(255,107,157,0.5);
            margin-bottom: 20px;
            font-size: 1.4em;
        }
        #output {
            white-space: pre-wrap;
            background: rgba(20,20,40,0.9);
            padding: 15px;
            height: 50vh;
            overflow-y: auto;
            border-radius: 12px;
            border: 1px solid rgba(255,107,157,0.3);
            box-shadow: 0 0 20px rgba(255,107,157,0.1);
            margin-bottom: 15px;
            font-size: 14px;
            line-height: 1.6;
        }
        button {
            margin: 8px 5px;
            padding: 15px 25px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        .btn-primary {
            background: linear-gradient(135deg, #ff6b9d 0%, #c44569 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(255,107,157,0.4);
        }
        .btn-primary:active {
            transform: scale(0.95);
            box-shadow: 0 2px 10px rgba(255,107,157,0.3);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 12px;
        }
        .status-item {
            text-align: center;
        }
        .status-label {
            color: #888;
        }
        .status-value {
            color: #4ecdc4;
            font-weight: bold;
        }
        .status-value.connected {
            color: #4ecdc4;
        }
        .status-value.disconnected {
            color: #ff6b6b;
        }
        #comboDisplay {
            font-size: 48px;
            text-align: center;
            color: #ffd93d;
            text-shadow: 0 0 30px rgba(255,217,61,0.5);
            margin: 20px 0;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .pulse {
            animation: pulse 0.3s ease-in-out;
        }
    </style>
</head>
<body>
    <div id="hud">
        <h2>🌷 Lumenis v7 - System Dynamics HUD</h2>

        <div id="comboDisplay">0</div>

        <div class="status-bar">
            <div class="status-item">
                <div class="status-label">Server</div>
                <div id="serverStatus" class="status-value disconnected">OFFLINE</div>
            </div>
            <div class="status-item">
                <div class="status-label">Combo</div>
                <div id="comboStatus" class="status-value">0</div>
            </div>
            <div class="status-item">
                <div class="status-label">OBS</div>
                <div id="obsStatus" class="status-value disconnected">OFFLINE</div>
            </div>
        </div>

        <button class="btn-primary" onclick="simulateHit()">⚡ HIT</button>
        <button class="btn-secondary" onclick="clearOutput()">Clear</button>
        <button class="btn-secondary" onclick="testConnection()">Test</button>

        <div id="output">[System] Awaiting telemetry...</div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let comboCount = 0;

        async function simulateHit() {
            try {
                const res = await fetch(API_BASE + '/api/telemetry', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({type: 'hit', timestamp: Date.now()})
                });
                const data = await res.json();
                comboCount = data.combo.hitCount;
                updateComboDisplay();
                appendOutput(`[HIT] Count: ${comboCount}`, '#4ecdc4');
            } catch (e) {
                appendOutput('[ERROR] ' + e.message, '#ff6b6b');
            }
        }

        function updateComboDisplay() {
            const display = document.getElementById('comboDisplay');
            display.textContent = comboCount;
            display.classList.remove('pulse');
            void display.offsetWidth;
            display.classList.add('pulse');
        }

        function clearOutput() {
            document.getElementById('output').textContent = '[System] Cleared';
        }

        function appendOutput(msg, color = '#fff') {
            const out = document.getElementById('output');
            const time = new Date().toLocaleTimeString();
            out.textContent = `[${time}] ${msg}\n` + out.textContent;
        }

        async function testConnection() {
            try {
                const res = await fetch(API_BASE + '/api/status');
                const data = await res.json();
                document.getElementById('serverStatus').textContent = 'ONLINE';
                document.getElementById('serverStatus').className = 'status-value connected';
                document.getElementById('obsStatus').textContent = data.obs ? 'CONNECTED' : 'OFFLINE';
                document.getElementById('obsStatus').className = data.obs ? 'status-value connected' : 'status-value disconnected';
                comboCount = data.combo.hitCount || 0;
                document.getElementById('comboStatus').textContent = comboCount;
                appendOutput('[System] Connection OK', '#4ecdc4');
            } catch (e) {
                document.getElementById('serverStatus').textContent = 'OFFLINE';
                document.getElementById('serverStatus').className = 'status-value disconnected';
                appendOutput('[ERROR] ' + e.message, '#ff6b6b');
            }
        }

        // Poll for updates
        setInterval(async () => {
            try {
                const res = await fetch(API_BASE + '/api/council');
                const log = await res.json();
                const dynamicsMsgs = log.filter(m => m.agent === 'SystemDynamics').slice(-3);
                dynamicsMsgs.forEach(m => {
                    appendOutput(`[Dynamics] ${m.msg}`, '#ff6b9d');
                });
                if (dynamicsMsgs.length > 0) {
                    const lastCombo = dynamicsMsgs[0].msg.match(/Hit count: (\d+)/);
                    if (lastCombo) {
                        comboCount = parseInt(lastCombo[1]);
                        updateComboDisplay();
                    }
                }
            } catch (e) {
                // Silent fail for polling
            }
        }, 2000);

        // Initial test
        setTimeout(testConnection, 1000);
    </script>
</body>
</html>
